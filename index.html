<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Seychelles Holiday Assistant</title>
<meta name="description" content="Travel assistant for Anthony and Lesley's Seychelles holiday, July 2026">
<meta name="theme-color" content="#00BCD4">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌴</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--turquoise:#00BCD4;--ocean:#1565C0;--sand:#F5E6C8;--white:#FAFAFA;
--coral:#FF6F61;--dark:#1A1A2E;--coral-light:#FFF0EE;--turquoise-light:#E0F7FA;
--ocean-light:#E3F2FD;--green:#43A047;--green-light:#E8F5E9;
--card:#FFFFFF;--border:#E0E0E0;--grey:#9E9E9E;--text2:#616161;
--shadow:0 2px 8px rgba(0,0,0,.08);--radius:12px;
}
html{font-size:17px;scroll-behavior:smooth}
body{
font-family:'Nunito',system-ui,-apple-system,sans-serif;
background:var(--white);color:var(--dark);line-height:1.6;
padding-bottom:72px;min-height:100vh;
}
h2{font-size:1.18rem;font-weight:800;margin-bottom:.6rem;color:var(--ocean)}
h3{font-size:1rem;font-weight:700;margin-bottom:.4rem}
a{color:var(--ocean);text-decoration:underline}

/* Top bar */
.top-bar{
position:sticky;top:0;z-index:100;
background:linear-gradient(135deg,var(--ocean) 0%,var(--turquoise) 100%);
color:#fff;padding:.6rem 1rem;min-height:72px;
display:flex;flex-direction:column;justify-content:center;
box-shadow:0 2px 12px rgba(0,0,0,.15);
}
.top-row{display:flex;justify-content:space-between;align-items:center}
.top-phase{font-size:.72rem;font-weight:700;background:rgba(255,255,255,.2);border-radius:16px;padding:.15rem .6rem;white-space:nowrap}
.top-date{font-size:.78rem;font-weight:600;opacity:.9}
.top-tip{font-size:.72rem;opacity:.85;margin-top:.25rem;line-height:1.4}
.refresh-btn{
background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:50%;
width:36px;height:36px;min-width:36px;cursor:pointer;display:flex;
align-items:center;justify-content:center;transition:transform .3s;
}
.refresh-btn:active{transform:rotate(180deg)}
.refresh-btn svg{width:18px;height:18px}

/* Bottom nav */
.bottom-nav{
position:fixed;bottom:0;left:0;right:0;background:var(--white);
display:flex;justify-content:space-around;align-items:stretch;
z-index:100;height:56px;border-top:1px solid var(--border);
padding-bottom:env(safe-area-inset-bottom,0);
}
.nav-btn{
display:flex;flex-direction:column;align-items:center;justify-content:center;
border:none;background:none;color:var(--grey);font-size:.647rem;font-weight:700;
padding:.25rem 0;min-width:48px;min-height:56px;cursor:pointer;
transition:color .15s;flex:1;letter-spacing:.3px;
font-family:'Nunito',system-ui,sans-serif;
}
.nav-btn svg{width:28px;height:28px;margin-bottom:1px}
.nav-btn.active{color:var(--turquoise)}
.nav-btn:focus-visible{outline:2px solid var(--turquoise);outline-offset:-2px;border-radius:4px}

/* Sections */
.section{display:none;padding:.75rem;max-width:640px;margin:0 auto}
.section.active{display:block}

/* Cards */
.card{
background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
padding:1rem;margin-bottom:.75rem;border:1px solid var(--border);min-height:80px;
}
.card-date{font-size:.7rem;font-weight:800;color:var(--turquoise);text-transform:uppercase;letter-spacing:.5px}
.card-title{font-size:1rem;font-weight:800;margin:.15rem 0 .35rem}
.card-body{font-size:.88rem;line-height:1.65}
.card-body p{margin-bottom:.4rem}
.card-tip{
background:var(--turquoise-light);border-radius:8px;padding:.5rem .65rem;
font-size:.82rem;margin-top:.6rem;line-height:1.5;
}
.card-tip::before{content:'💡 '}

/* Status badges */
.badge{display:inline-block;border-radius:12px;padding:.12rem .55rem;font-size:.68rem;font-weight:700;margin:.2rem .2rem .2rem 0}
.badge-upcoming{background:var(--ocean-light);color:var(--ocean)}
.badge-today{background:var(--green-light);color:var(--green)}
.badge-complete{background:#eee;color:#888}

/* Mobility */
.mob{
display:inline-flex;align-items:center;gap:.3rem;
background:var(--coral);color:#fff;border-radius:16px;
padding:.15rem .6rem;font-size:.72rem;font-weight:700;
margin:.2rem .15rem .2rem 0;
}
.mob::before{content:'♿'}
.mob-banner{
background:var(--coral-light);border:2px solid var(--coral);
border-radius:8px;padding:.5rem .65rem;font-size:.82rem;
margin-bottom:.6rem;font-weight:600;line-height:1.5;
}
.mob-banner::before{content:'♿ '}

/* Tight warning */
.tight{
background:#FFF3E0;border:2px solid #FF9800;border-radius:8px;
padding:.5rem .65rem;font-size:.82rem;margin:.4rem 0;font-weight:700;
}
.tight::before{content:'⚠️ '}

/* Lounge badge */
.lounge{
display:inline-flex;align-items:center;gap:.3rem;
background:var(--ocean-light);border-radius:16px;
padding:.15rem .6rem;font-size:.72rem;font-weight:600;color:var(--ocean);
margin:.2rem .15rem .2rem 0;
}
.lounge::before{content:'🛋️'}

/* Checklist */
.chk{display:flex;align-items:flex-start;gap:.65rem;padding:.55rem 0;border-bottom:1px solid #f0f0f0}
.chk:last-child{border-bottom:none}
.chk-box{
width:32px;height:32px;min-width:32px;border-radius:8px;
border:2px solid #ccc;background:#fff;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:all .15s;
}
.chk-box.on{background:var(--green);border-color:var(--green)}
.chk-box.on::after{content:'✓';color:#fff;font-weight:800;font-size:.85rem}
.chk-label{font-size:.85rem;line-height:1.5;padding-top:3px}
.chk-label.done{text-decoration:line-through;opacity:.5}

/* Filters */
.filters{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.75rem;padding-bottom:.6rem;border-bottom:1px solid #f0f0f0}
.fbtn{
border:2px solid var(--turquoise);background:#fff;color:var(--turquoise);
border-radius:16px;padding:.25rem .65rem;font-size:.75rem;font-weight:700;
cursor:pointer;min-height:36px;transition:all .15s;
font-family:'Nunito',system-ui,sans-serif;
}
.fbtn.on{background:var(--turquoise);color:#fff}
.fbtn:focus-visible{outline:2px solid var(--ocean);outline-offset:2px}

/* Tags */
.tag{
display:inline-block;background:var(--sand);color:var(--dark);
border-radius:10px;padding:.1rem .45rem;font-size:.68rem;
font-weight:700;margin:.1rem .1rem .1rem 0;
}
.tag.mob-tag{background:var(--coral-light);color:var(--coral)}

/* Access rating */
.feet{font-size:.75rem;letter-spacing:1px}

/* Itinerary */
.itin{
background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
padding:.85rem;margin-bottom:.6rem;border-left:4px solid var(--turquoise);
border:1px solid var(--border);
}
.itin-day{font-size:.7rem;font-weight:800;color:var(--turquoise);text-transform:uppercase;letter-spacing:.4px}
.itin-title{font-size:.95rem;font-weight:800;margin:.15rem 0 .3rem}
.itin-note{
width:100%;border:1px solid #ddd;border-radius:8px;padding:.45rem;
font-size:.82rem;margin-top:.4rem;min-height:48px;resize:vertical;
font-family:'Nunito',system-ui,sans-serif;
}
.itin-actions{display:flex;gap:.35rem;margin-top:.4rem;justify-content:flex-end}
.itin-btn{
border:none;background:var(--turquoise-light);color:var(--turquoise);
border-radius:6px;padding:.3rem .55rem;font-size:.75rem;font-weight:700;
cursor:pointer;min-width:48px;min-height:40px;
font-family:'Nunito',system-ui,sans-serif;
}
.itin-btn:disabled{opacity:.25;cursor:default}

/* Editable fields */
.efield{
width:100%;border:1px solid #ddd;border-radius:8px;padding:.4rem .55rem;
font-size:.85rem;font-family:'Nunito',system-ui,sans-serif;
min-height:48px;margin-top:.3rem;
}
.efield-sm{width:120px;display:inline-block}

/* Mood selector */
.mood-row{display:flex;gap:.5rem;margin:.4rem 0}
.mood-btn{
font-size:1.4rem;background:none;border:2px solid transparent;
border-radius:8px;padding:.2rem .35rem;cursor:pointer;min-width:48px;min-height:48px;
display:flex;align-items:center;justify-content:center;
}
.mood-btn.on{border-color:var(--turquoise);background:var(--turquoise-light)}

/* Budget bar */
.budget-bar{height:12px;background:#eee;border-radius:6px;overflow:hidden;margin:.4rem 0}
.budget-fill{height:100%;background:var(--green);border-radius:6px;transition:width .3s}
.budget-fill.over{background:var(--coral)}

/* Phrasebook */
.phrase{cursor:pointer;transition:background .15s}
.phrase:hover{background:var(--turquoise-light)}
.phrase-pron{display:none;font-style:italic;color:var(--text2);font-size:.82rem;margin-top:.2rem}
.phrase.open .phrase-pron{display:block}

/* Weather */
.wx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:.4rem;margin-top:.6rem}
.wx-day{background:var(--turquoise-light);border-radius:8px;padding:.45rem;text-align:center;font-size:.75rem}
.wx-day .temp{font-size:1rem;font-weight:800;color:var(--ocean)}
.wx-day .dn{font-weight:700;color:var(--dark)}
.wx-current{
background:linear-gradient(135deg,var(--ocean),var(--turquoise));
color:#fff;border-radius:var(--radius);padding:1rem;margin-bottom:.75rem;
}
.wx-current .big{font-size:2.2rem;font-weight:800}
.wx-current .desc{font-size:.9rem;text-transform:capitalize;opacity:.9}
.wx-info{display:grid;grid-template-columns:1fr 1fr;gap:.35rem;margin-top:.6rem}
.wx-info div{font-size:.78rem;opacity:.9}
.wx-fallback{font-size:.8rem;font-style:italic;color:#999;margin-top:.4rem}

/* Skeleton */
.skel{background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius);min-height:100px;margin-bottom:.75rem}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Reminder chips */
.chip{
display:inline-flex;align-items:center;gap:.3rem;
background:var(--sand);border-radius:16px;padding:.3rem .7rem;
font-size:.78rem;font-weight:600;cursor:pointer;margin:.2rem;
transition:all .15s;border:2px solid transparent;min-height:40px;
}
.chip.done{background:var(--green-light);border-color:var(--green);text-decoration:line-through;opacity:.6}

/* Detail overlay */
.overlay{
display:none;position:fixed;top:0;left:0;right:0;bottom:0;
background:var(--white);z-index:200;overflow-y:auto;
padding:0 0 72px;
}
.overlay.open{display:block}
.overlay-header{
position:sticky;top:0;background:var(--card);padding:.75rem 1rem;
border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem;z-index:10;
}
.overlay-back{
border:none;background:none;font-size:1.2rem;cursor:pointer;
min-width:48px;min-height:48px;display:flex;align-items:center;justify-content:center;
color:var(--ocean);font-weight:700;
}
.overlay-body{padding:1rem;max-width:640px;margin:0 auto}

/* Sunset */
.sunset-card{background:linear-gradient(135deg,#FF9800,#FF6F61);color:#fff;border-radius:var(--radius);padding:.85rem;margin-bottom:.75rem}
.sunset-card .time{font-size:1.4rem;font-weight:800}

/* Section title */
.sec-title{font-size:.72rem;font-weight:800;color:var(--grey);text-transform:uppercase;letter-spacing:.8px;margin:1rem 0 .4rem}

/* Accessibility */
:focus-visible{outline:2px solid var(--turquoise);outline-offset:2px}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
@media(min-width:480px){.nav-btn{font-size:.7rem}}
</style>
</head>
<body>

<header class="top-bar" role="banner">
<div style="font-size:1.1rem;font-weight:800;letter-spacing:.3px;margin-bottom:.2rem">🌴 Bamfords Seychelles Holiday</div>
<div class="top-row">
  <button class="top-phase" id="tPhase" style="border:none;cursor:pointer;font-family:inherit" aria-label="Go to journey"></button>
  <span class="top-date" id="tDate"></span>
  <button class="refresh-btn" id="refreshBtn" aria-label="Refresh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg></button>
</div>
<div class="top-tip" id="tTip"></div>
</header>

<main>
<!-- TODAY -->
<section class="section active" id="sec-today" aria-label="Today">
<div id="todayContent"></div>
</section>

<!-- JOURNEY -->
<section class="section" id="sec-journey" aria-label="Journey">
<div id="journeyContent"></div>
</section>

<!-- EXPLORE -->
<section class="section" id="sec-explore" aria-label="Explore">
<div id="exploreContent"></div>
</section>

<!-- PLAN -->
<section class="section" id="sec-plan" aria-label="Plan">
<div id="planContent"></div>
</section>

<!-- INFO -->
<section class="section" id="sec-info" aria-label="Info">
<div id="infoContent"></div>
</section>
</main>

<!-- Detail overlay -->
<div class="overlay" id="overlay">
<div class="overlay-header">
  <button class="overlay-back" id="overlayBack" aria-label="Back">← Back</button>
  <h2 id="overlayTitle" style="margin:0;font-size:1rem"></h2>
</div>
<div class="overlay-body" id="overlayBody"></div>
</div>

<nav class="bottom-nav" role="navigation" aria-label="Main">
<button class="nav-btn active" data-tab="today" aria-label="Today">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  Today
</button>
<button class="nav-btn" data-tab="journey" aria-label="Journey">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
  Journey
</button>
<button class="nav-btn" data-tab="explore" aria-label="Explore">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36z"/></svg>
  Explore
</button>
<button class="nav-btn" data-tab="plan" aria-label="Plan">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
  Plan
</button>
<button class="nav-btn" data-tab="info" aria-label="Info">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
  Info
</button>
</nav>

<script>
/* ========== CONFIG ========== */
const WEATHER_API_KEY = '%%WEATHER_API_KEY%%';
const LAT=-4.7236,LON=55.5089;
const TRIP_DATES={train:new Date('2026-07-03'),outFlight:new Date('2026-07-04'),arrive:new Date('2026-07-05'),holStart:new Date('2026-07-05'),holEnd:new Date('2026-07-14'),depart:new Date('2026-07-14'),home:new Date('2026-07-15')};

/* ========== STATE ========== */
const SK='sey_v2';
let S=load();
function load(){try{return JSON.parse(localStorage.getItem(SK))||def()}catch{return def()}}
function def(){return{pretrip:{},retPack:{},comfort:{},itin:null,journal:{},budget:{rate:60,daily:100,entries:[]},hotel:{},emergency:{},health:{},moments:[{title:'First evening in Seychelles',date:'5th July',loc:'',ref:'',notes:''},{title:'Final evening dinner',date:'13th July',loc:'',ref:'',notes:''}],returnTrain:'',todayChips:{}}}
function save(){localStorage.setItem(SK,JSON.stringify(S))}

/* ========== NAV ========== */
const navBtns=document.querySelectorAll('.nav-btn');
const overlay=document.getElementById('overlay');
document.getElementById('overlayBack').onclick=()=>overlay.classList.remove('open');
navBtns.forEach(b=>b.addEventListener('click',()=>{
  navBtns.forEach(n=>n.classList.remove('active'));b.classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+b.dataset.tab).classList.add('active');
  window.scrollTo(0,0);
}));
function openDetail(title,html){
  document.getElementById('overlayTitle').textContent=title;
  document.getElementById('overlayBody').innerHTML=html;
  overlay.classList.add('open');
  overlay.scrollTo(0,0);
  bindEditable();
}

/* ========== HELPERS ========== */
function today(){return new Date(new Date().getFullYear(),new Date().getMonth(),new Date().getDate())}
function fmtDate(d){const o={weekday:'long',day:'numeric',month:'long',year:'numeric'};return d.toLocaleDateString('en-GB',o)}
function tripPhase(){
  const t=today();
  if(t<TRIP_DATES.train)return'Pre-Trip';
  if(+t===+TRIP_DATES.train)return'Travel Day';
  if(t>TRIP_DATES.train&&t<TRIP_DATES.arrive)return'In Transit';
  if(t>=TRIP_DATES.holStart&&t<=TRIP_DATES.holEnd)return'On Holiday';
  if(+t===+TRIP_DATES.home)return'Heading Home';
  if(t>TRIP_DATES.home)return'Home';
  return'Pre-Trip';
}
function holDay(){const t=today();if(t>=TRIP_DATES.holStart&&t<=TRIP_DATES.holEnd){return Math.floor((t-TRIP_DATES.holStart)/(864e5))}return-1}
const TIPS=['Check the Pre-Trip checklist — have you packed everything?','July UV in Seychelles hits 8–11. Reapply sun cream every 90 minutes.','Hotel transfers are the easiest option. Book at reception the evening before.','Stay hydrated — aim for 2+ litres per day in tropical heat.','Keep medication in hand luggage at all times during flights.','Both SCR and Euros accepted. Cards work at hotels and larger restaurants.','Download offline Google Maps for Mahé before you leave.'];
function dailyTip(){return TIPS[new Date().getDay()%TIPS.length]}
function makeChk(list,stateKey,onChange){
  return list.map((item,i)=>{
    const k=stateKey+'_'+i,c=S[stateKey]?.[i]||false;
    return`<div class="chk"><div class="chk-box${c?' on':''}" role="checkbox" aria-checked="${c}" tabindex="0" data-sk="${stateKey}" data-idx="${i}"></div><div class="chk-label${c?' done':''}">${item}</div></div>`;
  }).join('');
}
function bindChk(container,cb){
  container.querySelectorAll('.chk-box').forEach(b=>{
    const h=()=>{
      const sk=b.dataset.sk,i=b.dataset.idx;
      if(!S[sk])S[sk]={};
      S[sk][i]=!S[sk][i];save();
      // Update DOM directly
      const on=S[sk][i];
      b.classList.toggle('on',on);
      b.setAttribute('aria-checked',String(on));
      const label=b.nextElementSibling;
      if(label)label.classList.toggle('done',on);
      if(cb)cb();
    };
    b.onclick=h;b.onkeydown=e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();h()}};
  });
}
function bindEditable(){
  document.querySelectorAll('[data-save]').forEach(el=>{
    const[obj,key]=el.dataset.save.split('.');
    if(!S[obj])S[obj]={};
    if(S[obj][key]!=null)el.value=S[obj][key];
    el.addEventListener('input',()=>{S[obj][key]=el.value;save()});
  });
}
function feetIcons(n){return '🦶'.repeat(n)}

/* ========== TOP BAR ========== */
function renderTop(){
  const phaseEl=document.getElementById('tPhase');
  phaseEl.textContent=tripPhase();
  phaseEl.onclick=()=>navTo('journey');
  document.getElementById('tDate').textContent=fmtDate(today());
  document.getElementById('tTip').textContent=dailyTip();
}
renderTop();

/* ========== REFRESH ========== */
document.getElementById('refreshBtn').onclick=()=>{
  S.wxCache=null;save();
  renderTop();renderToday();renderJourney();renderExplore();renderPlan();renderInfo();
  window.scrollTo(0,0);
};

/* ========== WEATHER ========== */
const WX_FALLBACK={
  current:{temp:28,desc:'Partly cloudy (typical July)',humidity:78,wind:15,uv:9,rain:20},
  forecast:[{d:'Mon',t:28,i:'🌤️'},{d:'Tue',t:29,i:'☀️'},{d:'Wed',t:27,i:'🌦️'},{d:'Thu',t:28,i:'🌤️'},{d:'Fri',t:29,i:'☀️'},{d:'Sat',t:28,i:'🌦️'},{d:'Sun',t:27,i:'🌤️'}],
  fb:true
};
async function getWx(){
  if(S.wxCache&&(Date.now()-S.wxCache.ts<18e5))return S.wxCache.data;
  const k=WEATHER_API_KEY&&!WEATHER_API_KEY.includes('%%')?WEATHER_API_KEY:null;
  if(!k)return WX_FALLBACK;
  try{
    const[cr,fr]=await Promise.all([
      fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&units=metric&appid=${k}`),
      fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${LAT}&lon=${LON}&units=metric&cnt=56&appid=${k}`)
    ]);
    if(!cr.ok||!fr.ok)return WX_FALLBACK;
    const c=await cr.json(),f=await fr.json();
    const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const dm={};
    f.list.forEach(it=>{const d=new Date(it.dt*1000),k2=d.toDateString();if(!dm[k2])dm[k2]={temps:[],day:days[d.getDay()],descs:[]};dm[k2].temps.push(it.main.temp);dm[k2].descs.push(it.weather[0].main)});
    const iconMap={Clear:'☀️',Clouds:'⛅',Rain:'🌧️',Drizzle:'🌦️',Thunderstorm:'⛈️'};
    const fc=Object.values(dm).slice(0,7).map(d=>{
      const avg=Math.round(d.temps.reduce((a,b)=>a+b,0)/d.temps.length);
      const most=d.descs.sort((a,b)=>d.descs.filter(v=>v===a).length-d.descs.filter(v=>v===b).length).pop();
      return{d:d.day,t:avg,i:iconMap[most]||'🌤️'};
    });
    const data={current:{temp:Math.round(c.main.temp),desc:c.weather[0].description,humidity:c.main.humidity,wind:Math.round(c.wind.speed*3.6),uv:null,rain:c.clouds?.all||0},forecast:fc,fb:false};
    S.wxCache={ts:Date.now(),data};save();return data;
  }catch{return WX_FALLBACK}
}
function wxCard(w,full){
  let h=`<div class="wx-current"><div class="big">${w.current.temp}°C</div><div class="desc">${w.current.desc}</div><div class="wx-info"><div>💧 Humidity: ${w.current.humidity}%</div><div>💨 Wind: ${w.current.wind} km/h</div><div>☀️ UV: ${w.current.uv||'8–11 (very high)'}</div><div>🌧️ Rain chance: ${w.current.rain}%</div><div>🌅 Sunrise ≈ 6:15am</div><div>🌇 Sunset ≈ 6:15pm</div></div></div>`;
  if(w.fb)h+='<div class="wx-fallback">Showing typical July weather. Add OpenWeatherMap API key for live data.</div>';
  if(full){
    h+='<h3>7-Day Forecast</h3><div class="wx-grid">';
    w.forecast.forEach(d=>h+=`<div class="wx-day"><div class="dn">${d.d}</div><div style="font-size:1.3rem">${d.i}</div><div class="temp">${d.t}°C</div></div>`);
    h+='</div>';
  }
  h+=`<div class="card" style="margin-top:.6rem;border-left:3px solid var(--coral)"><h3>Best Time to Go Out</h3><p style="font-size:.85rem">Early morning (6:30–10am) and late afternoon (4–6pm). Avoid midday sun 11am–2pm. UV index is very high in July.</p><p style="font-size:.85rem;margin-top:.3rem"><strong>Beach:</strong> Mornings ideal. Afternoon showers pass quickly. Always have shade.</p></div>`;
  return h;
}

function navTo(tab){

  h+=`<div class="card"><h3>Log Spend</h3><div style="display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.4rem"><select id="budgetCat" class="efield" style="width:auto;min-width:100px"><option>Food</option><option>Transport</option><option>Activities</option><option>Shopping</option><option>Other</option></select><input id="budgetAmt" class="efield efield-sm" type="number" placeholder="£ amount" step="0.01"><button class="itin-btn" id="budgetAdd" style="background:var(--green);color:#fff">Add</button></div></div>`;

  // Health tracker
  h+='<h2 style="margin-top:1rem">Health & Wellbeing</h2>';
  h+=`<div class="card" style="border-left:3px solid var(--coral)"><h3>🦶 Lesley\'s Foot Recovery Tracker</h3>
<label style="font-size:.82rem;font-weight:600">Pain level today (1–5): <select class="efield" style="width:80px" data-save="health.pain"><option value="">-</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></label>
<label style="font-size:.82rem;font-weight:600;margin-top:.3rem;display:block">Swelling? <select class="efield" style="width:100px" data-save="health.swell"><option value="">-</option><option>None</option><option>Mild</option><option>Moderate</option><option>Severe</option></select></label>
<label style="font-size:.82rem;font-weight:600;margin-top:.3rem;display:block">Elevation rest done today? <select class="efield" style="width:80px" data-save="health.elev"><option value="">-</option><option>Yes</option><option>No</option></select></label>
<label style="font-size:.82rem;font-weight:600;margin-top:.3rem;display:block">Walking limit (mins): <input class="efield efield-sm" type="number" data-save="health.walkLimit" placeholder="e.g. 30"></label>
<div class="card-tip" style="margin-top:.5rem">Rest in air-conditioned room during peak heat (11am–3pm). Humidity affects recovery.</div></div>`;

  h+=`<div class="card"><h3>Emergency Contacts</h3>
<p style="font-size:.85rem">🏥 Seychelles Hospital Victoria: <strong>+248 438 8000</strong></p>
<p style="font-size:.85rem">🚔 Seychelles Police: <strong>999</strong></p>
<label style="font-size:.82rem;font-weight:600;margin-top:.3rem;display:block">Hotel medical: <input class="efield" data-save="health.hotelMed" placeholder="Ask at reception"></label>
<label style="font-size:.82rem;font-weight:600;margin-top:.3rem;display:block">Insurance emergency: <input class="efield" data-save="health.insNum" placeholder="Policy emergency number"></label>
<label style="font-size:.82rem;font-weight:600;margin-top:.3rem;display:block">Lesley medical notes: <textarea class="efield" data-save="health.wifeNotes" placeholder="Medications, allergies, GP info..." style="min-height:60px"></textarea></label></div>`;

  el.innerHTML=h;
  bindEditable();

  // Itinerary notes
  el.querySelectorAll('.itin-note').forEach(ta=>{
    ta.oninput=()=>{const d=getItin();d[ta.dataset.ni].note=ta.value;saveItin(d)};
  });
  // Reorder
  el.querySelectorAll('[data-mu]').forEach(b=>b.onclick=()=>{const d=getItin(),i=+b.dataset.mu;if(i>0){[d[i],d[i-1]]=[d[i-1],d[i]];d.forEach((x,j)=>x.day=j+1);saveItin(d);renderPlan()}});
  el.querySelectorAll('[data-md]').forEach(b=>b.onclick=()=>{const d=getItin(),i=+b.dataset.md;if(i<d.length-1){[d[i],d[i+1]]=[d[i+1],d[i]];d.forEach((x,j)=>x.day=j+1);saveItin(d);renderPlan()}});

  // Journal
  el.querySelectorAll('[data-jfield]').forEach(f=>{
    const[jk,field]=f.dataset.jfield.split('.');
    if(!S.journal[jk])S.journal[jk]={};
    f.oninput=()=>{S.journal[jk][field]=f.value;save()};
  });
  el.querySelectorAll('[data-jmood]').forEach(b=>{
    b.onclick=()=>{const jk=b.dataset.jmood;if(!S.journal[jk])S.journal[jk]={};S.journal[jk].mood=b.dataset.mv;save();renderPlan()};
  });

  // Budget
  const addBtn=document.getElementById('budgetAdd');
  if(addBtn)addBtn.onclick=()=>{
    const amt=parseFloat(document.getElementById('budgetAmt').value);
    if(!amt||isNaN(amt))return;
    S.budget.entries.push({date:today().toDateString(),cat:document.getElementById('budgetCat').value,amt});
    save();renderPlan();
  };
  const dailyEl=document.getElementById('budgetDaily');
  const rateEl=document.getElementById('budgetRate');
  if(dailyEl)dailyEl.oninput=()=>{S.budget.daily=+dailyEl.value||100;save();renderPlan()};
  if(rateEl)rateEl.oninput=()=>{S.budget.rate=+rateEl.value||60;save()};

  // Special moments save
  el.querySelectorAll('[data-save^="moments."]').forEach(f=>{
    f.oninput=()=>{
      const parts=f.dataset.save.split('.');
      const[idx,field]=parts[1].split('_');
      if(!S.moments[idx])return;
      S.moments[idx][field]=f.value;save();
    };
  });
}
renderPlan();

<label style="font-size:.82rem;font-weight:600;display:block;margin-top:.3rem">Concierge: <input class="efield" data-save="hotel.concierge" placeholder="Fill on arrival"></label>
<label style="font-size:.82rem;font-weight:600;display:block;margin-top:.3rem">Beach equipment: <input class="efield" data-save="hotel.beach" placeholder="Free sunbeds? Umbrellas?"></label>
</div></div>`;

  // Weather
  h+='<h2 style="margin-top:1rem">7-Day Weather Forecast</h2>';
  const w=await getWx();
  h+=wxCard(w,true);

  // Transport
  h+=`<h2 style="margin-top:1rem">Transport — Mahé</h2>

<div class="card"><h3>🚌 Bus (reference only)</h3><p style="font-size:.85rem">7 SCR per journey along coast road. Limited accessibility — NOT recommended for reduced mobility.</p></div>`;

  // Emergency
  h+=`<h2 style="margin-top:1rem">Emergency Contacts</h2>

renderInfo();
